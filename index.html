<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliyə üçün Özəl ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
            --text-color: #2d3436;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            display: flex; justify-content: center; align-items: center;
        }

        #bg-canvas {
            position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center; z-index: 10; max-width: 400px;
            width: 90%; transform: scale(0.9); opacity: 0;
            border: 2px solid white;
        }

        h1 { color: var(--primary-pink); margin-bottom: 10px; }
        p { color: var(--text-color); line-height: 1.6; font-size: 1.1rem; }

        .btn {
            background: var(--primary-pink); color: white;
            border: none; padding: 12px 25px; border-radius: 25px;
            cursor: pointer; font-size: 1rem; transition: 0.3s;
            margin-top: 20px; box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        .btn:hover { transform: translateY(-3px); background: #ef627a; }

        .floating-heart {
            position: absolute; font-size: 20px; color: white;
            user-select: none; z-index: 1;
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div class="card" id="mainCard">
        <h1>Bağışla məni ❤️</h1>
        <p id="message">Hər kəs səhv edər, amma mən səni itirmək istəmirəm. Bu balaca səhifə sənə olan sevgimin kiçik bir nişanəsidir...</p>
        <button class="btn" onclick="nextStep()">Məni bağışlayırsan?</button>
    </div>

    <script>
        // Giriş animasiyası
        window.onload = () => {
            gsap.to("#mainCard", { duration: 1.2, scale: 1, opacity: 1, ease: "back.out(1.7)" });
            createFloatingHearts();
        };

        function nextStep() {
            const card = document.getElementById('mainCard');
            gsap.to(card, { duration: 0.5, opacity: 0, y: -50, onComplete: () => {
                card.innerHTML = `
                    <h1>Səni Sevirəm! 💖</h1>
                    <p>Dünyanın ən gözəl insanı, gəl küsülü qalmayaq. Sənin bir təbəssümün hər şeyə dəyər!</p>
                    <div style="font-size: 50px;">🎂🌹✨</div>
                `;
                gsap.to(card, { duration: 0.5, opacity: 1, y: 0 });
                confettiEffect();
            }});
        }

        function createSingleHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '110vh';
            heart.style.fontSize = (Math.random() * 30 + 10) + 'px';
            document.body.appendChild(heart);

            gsap.to(heart, {
                y: '-120vh',
                x: (Math.random() - 0.5) * 200,
                rotation: Math.random() * 360,
                duration: Math.random() * 3 + 2,
                ease: "power1.out",
                onComplete: () => heart.remove()
            });
        }

        function createFloatingHearts() {
            setInterval(createSingleHeart, 400);
        }

        function confettiEffect() {
            for(let i=0; i<50; i++) {
                setTimeout(createSingleHeart, i * 50);
            }
        }
    </script>
</body>
</html>
